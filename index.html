<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080c12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vital">
<title>Vital · Health Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080c12;--bg1:#0f1520;--bg2:#161f2e;--bg3:#1e2a3a;
  --border:#1e2d3d;--border2:#243347;
  --t1:#e2eaf6;--t2:#8fa0b8;--t3:#4d6070;--t4:#293442;
  --accent:#4dffc3;--accent2:#2be3a8;--accent-bg:rgba(77,255,195,0.08);
  --red:#ff5757;--red-bg:rgba(255,87,87,0.1);
  --orange:#ff9f4a;--orange-bg:rgba(255,159,74,0.1);
  --yellow:#ffd166;--yellow-bg:rgba(255,209,102,0.1);
  --green:#4dffc3;--green-bg:rgba(77,255,195,0.1);
  --nav:64px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
  --r:16px;--r-sm:10px;--r-lg:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg0);overscroll-behavior:none}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased;font-size:15px}
#app{min-height:100vh;padding-top:var(--safe-t);padding-bottom:calc(var(--nav) + var(--safe-b) + 8px);position:relative;overflow-x:hidden}

/* ── NAV ── */
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe-b));background:rgba(8,12,18,0.92);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding-bottom:var(--safe-b);z-index:100}
.nb{background:none;border:none;color:var(--t3);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;flex:1;font-size:10px;font-weight:500;font-family:inherit;letter-spacing:.02em;transition:color .15s}
.nb svg{width:22px;height:22px;stroke-width:1.7}
.nb.on{color:var(--accent)}
.nb-fab{background:var(--accent)!important;color:var(--bg0)!important;width:50px;height:50px;border-radius:50%;flex:0 0 auto;margin:-14px 6px 0;box-shadow:0 4px 24px rgba(77,255,195,.3)}
.nb-fab svg{width:24px;height:24px;stroke-width:2}
.nb-fab span{display:none}

/* ── TYPOGRAPHY ── */
.serif{font-family:'DM Serif Display',Georgia,serif;letter-spacing:-.02em}
.mono{font-family:'JetBrains Mono',monospace}
.label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.16em;color:var(--t3)}

/* ── HEADER ── */
.hdr{padding:22px 18px 14px}
.hdr-eye{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--t3);margin-bottom:6px}
.hdr-title{font-family:'DM Serif Display',Georgia,serif;font-size:34px;line-height:1.1;color:var(--t1)}
.hdr-title em{font-style:italic;color:var(--accent)}
.hdr-sub{font-size:13px;color:var(--t2);margin-top:5px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin:0 14px 10px}
.card-glow{background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1px solid var(--border2);border-radius:20px;padding:22px;margin:0 14px 12px;position:relative;overflow:hidden}
.card-glow::after{content:'';position:absolute;top:-60%;right:-20%;width:280px;height:280px;background:radial-gradient(circle,rgba(77,255,195,.07),transparent 60%);pointer-events:none}

/* ── METRIC GRID ── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 14px 14px}
.mtile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.mtile-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--t3);margin-bottom:8px}
.mtile-val{font-family:'DM Serif Display',Georgia,serif;font-size:30px;color:var(--t1);line-height:1}
.mtile-unit{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t3);margin-left:3px}
.mtile-trend{font-size:11px;margin-top:6px;color:var(--t3)}
.mtile-trend.up{color:var(--green)}.mtile-trend.dn{color:var(--red)}

/* ── PRIORITY ITEM ── */
.pi{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin:0 14px 6px;cursor:pointer}
.pi-dot{width:5px;height:32px;border-radius:3px;flex-shrink:0}
.pi-dot.urg{background:var(--red);box-shadow:0 0 10px var(--red)}
.pi-dot.hi{background:var(--orange)}
.pi-dot.mon{background:var(--yellow)}
.pi-dot.ok{background:var(--green)}
.pi-body{flex:1;min-width:0}
.pi-name{font-size:14px;font-weight:500;color:var(--t1)}
.pi-meta{font-size:11px;color:var(--t2);margin-top:1px}
.pi-right{text-align:right}
.pi-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--t1)}
.pi-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:3px}
.pi-badge.urg{background:var(--red-bg);color:var(--red)}
.pi-badge.hi{background:var(--orange-bg);color:var(--orange)}
.pi-badge.ok{background:var(--green-bg);color:var(--green)}

/* ── INPUTS ── */
.input-tile{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 14px 10px}
.input-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.input-lbl{font-size:14px;font-weight:500;color:var(--t1)}
.input-val{font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:var(--accent);line-height:1}
.input-val .u{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--t3);margin-left:3px}

/* Range slider */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;background:var(--bg3);border-radius:3px;outline:none;margin:6px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--accent);border-radius:50%;box-shadow:0 0 0 4px rgba(77,255,195,.15);transition:transform .15s}
input[type=range]:active::-webkit-slider-thumb{transform:scale(1.2)}
.range-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:5px}

/* Pill group */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{flex:1;min-width:44px;background:var(--bg3);border:1px solid var(--border);color:var(--t2);padding:9px 4px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.pill.on{background:var(--accent);color:var(--bg0);border-color:var(--accent)}

/* Text input */
.tin{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;color:var(--t1);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.tin:focus{border-color:var(--accent)}
.tin::placeholder{color:var(--t3)}

/* Stepper */
.stepper{display:flex;align-items:center;background:var(--bg1);border-radius:12px;padding:3px;margin-top:8px}
.step-btn{width:44px;height:44px;background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;border-radius:10px;transition:background .15s;flex-shrink:0}
.step-btn:active{background:var(--bg3)}
.step-val{font-family:'DM Serif Display',Georgia,serif;font-size:22px;color:var(--t1);flex:1;text-align:center}

/* ── BUTTONS ── */
.btn{width:100%;background:var(--accent);color:var(--bg0);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
.btn-soft{background:var(--bg2);color:var(--t1);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;width:100%}
.btn-row{display:flex;gap:8px;margin:0 14px 10px}
.btn-row .btn,.btn-row .btn-soft{margin:0}

/* ── SECTIONS ── */
.sec{margin:0 14px 14px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-title{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--t3)}
.sec-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}

/* ── LIST ITEMS ── */
.li{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s}
.li:active{background:var(--bg3)}
.li-body{flex:1;min-width:0}
.li-title{font-size:14px;font-weight:500;color:var(--t1)}
.li-meta{font-size:12px;color:var(--t2);margin-top:1px}
.li-right{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);text-align:right;white-space:nowrap}

/* ── SUPPLEMENT ITEM ── */
.si{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.si.on{border-color:var(--accent);background:linear-gradient(90deg,rgba(77,255,195,.06) 0%,var(--bg2) 55%)}
.si-chk{width:26px;height:26px;border:2px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.si.on .si-chk{background:var(--accent);border-color:var(--accent)}
.si-chk svg{width:14px;height:14px;color:var(--bg0);opacity:0;transition:opacity .15s}
.si.on .si-chk svg{opacity:1}
.si-body{flex:1;min-width:0}
.si-name{font-size:14px;font-weight:500;color:var(--t1)}
.si-dose{font-size:11px;color:var(--t3);margin-top:1px}
.si-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;border-radius:4px;flex-shrink:0}
.si-badge.urg{background:var(--red-bg);color:var(--red)}
.si-badge.hi{background:var(--orange-bg);color:var(--orange)}

/* ── MEAL MACROS BAR ── */
.mbar{display:flex;gap:6px;margin:0 14px 12px}
.mpill{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.mpill-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:4px}
.mpill-val{font-family:'DM Serif Display',Georgia,serif;font-size:18px;color:var(--t1)}
.mpill-tgt{font-size:10px;color:var(--t3);margin-top:1px}
.mprog{height:3px;background:var(--bg3);border-radius:2px;margin-top:5px;overflow:hidden}
.mprog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.mprog-fill.over{background:var(--red)}

/* Meal section */
.msec{margin:0 14px 14px}
.msec-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.msec-name{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--t3)}
.msec-cal{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent)}
.mentry{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.mentry-name{font-size:13px;color:var(--t1);flex:1}
.mentry-cal{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}
.mentry-rm{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;line-height:1;padding:0 2px}
.madd-btn{width:100%;padding:10px;background:transparent;border:1px dashed var(--border2);border-radius:9px;color:var(--t3);font-size:13px;font-family:inherit;cursor:pointer;margin-top:4px;transition:border-color .15s,color .15s}
.madd-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Search */
.search-wrap{position:sticky;top:0;z-index:10;background:var(--bg0);padding:12px 14px;border-bottom:1px solid var(--border)}
.search-box{position:relative}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--t3)}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 14px 11px 40px;color:var(--t1);font-size:15px;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--accent)}
.food-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:0 14px 5px;cursor:pointer;transition:background .12s}
.food-item:active{background:var(--bg3)}
.food-item-name{flex:1;font-size:14px;color:var(--t1)}
.food-item-sub{font-size:11px;color:var(--t2);margin-top:1px}
.food-item-cal{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);font-weight:500}

/* ── LAB CARDS ── */
.lcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px;margin:0 14px 7px;cursor:pointer}
.lcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.lcard-name{font-size:14px;font-weight:500;color:var(--t1)}
.lcard-ref{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px}
.lcard-val{font-family:'DM Serif Display',Georgia,serif;font-size:22px;letter-spacing:-.02em}
.lcard-val.ok{color:var(--green)}.lcard-val.hi{color:var(--orange)}.lcard-val.urg{color:var(--red)}.lcard-val.lo{color:var(--orange)}
.lcard-trend{display:flex;align-items:center;gap:8px;margin-top:6px}
.spark{flex:1;height:22px;display:flex;align-items:flex-end;gap:3px}
.spark-b{flex:1;border-radius:2px 2px 0 0;min-height:4px;background:var(--t4)}
.spark-b.s-ok{background:var(--green)}.spark-b.s-hi{background:var(--orange)}.spark-b.s-urg{background:var(--red)}
.lcard-trend-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);white-space:nowrap}

/* ── WORKOUT ── */
.wo-day{background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1px solid var(--border2);border-radius:20px;padding:20px;margin:0 14px 14px}
.wo-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--t3)}
.wo-focus{font-family:'DM Serif Display',Georgia,serif;font-size:28px;margin-top:4px}
.wo-focus em{font-style:italic;color:var(--accent)}
.ei{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:5px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.ei.on{border-color:var(--accent);background:linear-gradient(90deg,rgba(77,255,195,.05) 0%,var(--bg2) 60%)}
.ei-body{flex:1;min-width:0}
.ei-name{font-size:13px;font-weight:500;color:var(--t1)}
.ei-sets{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:1px}
.ei-chk{width:24px;height:24px;border:2px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ei.on .ei-chk{background:var(--accent);border-color:var(--accent)}
.ei-chk svg{width:13px;height:13px;color:var(--bg0);opacity:0}
.ei.on .ei-chk svg{opacity:1}

/* ── BODY METRICS ── */
.big-in{width:100%;background:transparent;border:none;color:var(--accent);font-family:'DM Serif Display',Georgia,serif;font-size:68px;text-align:center;outline:none;letter-spacing:-.03em}

/* ── HISTORY ROW ── */
.hrow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;margin:0 14px 4px}
.hrow-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}
.hrow-val{font-size:13px;font-weight:500;color:var(--t1)}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--bg2);padding:4px;border-radius:12px;margin:0 14px 14px}
.tab{flex:1;padding:9px;background:transparent;border:none;color:var(--t2);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border-radius:9px;transition:all .15s}
.tab.on{background:var(--bg0);color:var(--t1)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;animation:fi .2s}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:22px 22px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px 18px calc(18px + var(--safe-b));animation:su .25s;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'DM Serif Display',Georgia,serif;font-size:26px;margin-bottom:3px}
.modal-sub{font-size:13px;color:var(--t2);margin-bottom:18px}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── TOAST ── */
.toast{position:fixed;top:calc(var(--safe-t) + 14px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--accent);color:var(--accent);padding:9px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:300;white-space:nowrap;animation:ti .3s,to .3s 1.7s forwards;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes to{to{opacity:0;transform:translate(-50%,-12px)}}

/* ── MORE MENU ── */
.more-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin:0 14px 6px;cursor:pointer;transition:background .12s}
.more-item:active{background:var(--bg3)}
.more-icon{width:36px;height:36px;background:var(--bg1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
.more-icon svg{width:18px;height:18px}
.more-body{flex:1}
.more-title{font-size:14px;font-weight:500;color:var(--t1)}
.more-desc{font-size:11px;color:var(--t3);margin-top:1px}
.more-arrow{color:var(--t3)}

/* ── PROGRESS RING ── */
.ring-wrap{display:flex;align-items:center;justify-content:center;position:relative}
.ring-text{position:absolute;text-align:center}

/* ── UTIL ── */
.spacer{height:24px}
.gap{margin-bottom:8px}
.row{display:flex;gap:8px}
.center{text-align:center}
.empty{text-align:center;padding:36px 20px;color:var(--t3)}
.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav">
  <button class="nb on" data-v="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V21a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1z"/></svg>
    <span>Home</span>
  </button>
  <button class="nb" data-v="daily">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
    <span>Daily</span>

function markerStatus(m){
  const v=m.history[m.history.length-1]?.v;
  if(v==null) return "unknown";
  if(m.lo!=null&&v<m.lo) return "low";
  if(m.hi!=null&&v>m.hi) return "high";
  return "ok";
}
function markerCls(m){
  const s=markerStatus(m);
  if(s==="ok") return "ok";
  if(m.priority==="urgent") return "urg";
  return "hi";
}

function meals(){
  const ms=tm();

  const customSlots=D.customMealSlots||[];
  const allSlots=[...defaultSlots,...customSlots];
  const by={};
  allSlots.forEach(s=>{by[s]=[];});
  ms.forEach(m=>{if(!by[m.mt])by[m.mt]=[];by[m.mt].push(m);});

  const tot=ms.reduce((a,m)=>({c:a.c+m.c,p:a.p+m.p,f:a.f+m.f,cb:a.cb+m.cb}),{c:0,p:0,f:0,cb:0});
  const T=D.targets;
  const pct=(v,t)=>Math.min(100,Math.round(v/t*100));

  $("#app").innerHTML=`
    <div class="hdr">
      <div class="hdr-eye">${fmtDate()}</div>
      <div class="hdr-title">Today's <em>meals</em></div>
    </div>

      ${[["Cal",Math.round(tot.c),T.cal],["Prot",Math.round(tot.p)+"g",T.prot+"g"],["Fat",Math.round(tot.f)+"g",T.fat+"g"],["Carbs",Math.round(tot.cb)+"g",T.carbs+"g"]].map(([l,v,t],i)=>{

          <div class="mpill-tgt">/ ${t}</div>

    ${allSlots.map(mt=>{

      return `<div class="msec">
        <div class="msec-hdr">
          <span class="msec-name">${mt}${isCustom?` <button onclick="deleteCustomSlot('${esc(mt)}')" style="background:none;border:none;color:var(--t3);font-size:14px;cursor:pointer;padding:0 2px">×</button>`:""}</span>

// WORKOUT
// ══════════════════════════════════════════════
// ── Calorie burn helpers ──────────────────────────────────────────────────────
function estBurn(plan, weight, durationMin){
  // Rough MET-based estimate. Weight in kg.
  const focus=plan.focus.toLowerCase();
  let met=5; // default strength
  if(focus.includes("cardio")) met=8;
  else if(focus.includes("legs")) met=6;
  else if(focus.includes("back")||focus.includes("chest")) met=5.5;
  const hrs=durationMin/60;
  return Math.round(met * weight * hrs * 1.05);
}

function workout(){
  const dow=new Date().getDay();
  const plan=PLANS[dow];
  const w=tw();
  const weight=D.metrics[D.metrics.length-1]?.w||82;
  const customEx=((D.customExercises||{})[dow])||{};
  const groups={};
  Object.entries(plan.groups).forEach(([g,exs])=>{groups[g]=[...exs,...(customEx[g]||[])];});
  Object.entries(plan.forEach||{}).forEach(()=>{});
  Object.entries(customEx).forEach(([g,exs])=>{if(!groups[g]) groups[g]=exs;});
  const allEx=Object.values(groups).flat();
  const done=allEx.filter(e=>w.ex[e]).length;

  const actualDur=w.duration||plan.durationMin;
  const burnEst=estBurn(plan,weight,actualDur);
  const burnActual=w.burnOverride||burnEst;
  const todayMeals=tm();
  const calIn=Math.round(todayMeals.reduce((s,m)=>s+m.c,0));
  const deficit=burnActual-calIn; // positive = deficit (burned more than eaten)
  const bmr=Math.round(88.36+(13.4*weight)+(4.8*170)-(5.7*40)); // Mifflin-StJeor for 40yr male
  const tdee=Math.round(bmr*1.55); // moderate activity
  const totalDeficit=calIn+burnActual < tdee ? tdee-(calIn-burnActual) : 0;
  const pct=Math.min(100,Math.round(done/allEx.length*100));

  $("#app").innerHTML=`
    <div class="hdr">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="hdr-eye">${fmtDate()}</div>
          <div class="hdr-title">Today: <em>${esc(plan.focus)}</em></div>
          <div class="hdr-sub">${done}/${allEx.length} done · ${plan.intensity}${w.done?" · ✓ Complete":""}</div>
        </div>
        <button onclick="openEditWorkout(${dow})" style="background:var(--bg2);border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">+ Edit</button>
      </div>
    </div>

    <!-- Progress ring + stats -->
    <div class="wo-day" style="padding-bottom:0">
      <div style="display:flex;align-items:center;gap:16px;padding:14px 14px 0">
        <!-- SVG ring -->
        <div style="position:relative;width:72px;height:72px;flex-shrink:0">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="30" fill="none" stroke="var(--bg3)" stroke-width="7"/>
            <circle cx="36" cy="36" r="30" fill="none" stroke="var(--accent)" stroke-width="7"
              stroke-dasharray="${Math.round(2*Math.PI*30)}"
              stroke-dashoffset="${Math.round(2*Math.PI*30*(1-pct/100))}"
              stroke-linecap="round" transform="rotate(-90 36 36)"
              style="transition:stroke-dashoffset .4s ease"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)">${pct}%</span>
          </div>
        </div>
        <div style="flex:1">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div style="background:var(--bg2);border-radius:10px;padding:10px 12px;border:1px solid var(--border)">
              <div style="font-size:10px;color:var(--t3);margin-bottom:2px">ESTIMATED BURN</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--orange)">${burnActual}</div>
              <div style="font-size:10px;color:var(--t3)">kcal</div>
            </div>
            <div style="background:var(--bg2);border-radius:10px;padding:10px 12px;border:1px solid var(--border)">
              <div style="font-size:10px;color:var(--t3);margin-bottom:2px">DURATION</div>
              <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--t1)">${actualDur}</div>
              <div style="font-size:10px;color:var(--t3)">min</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Calories in vs out bar -->
      <div style="padding:14px 14px 0">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:6px">
          <span>Calories IN (food) · <strong style="color:var(--t1)">${calIn}</strong></span>
          <span>Calories OUT (burn) · <strong style="color:var(--orange)">${burnActual}</strong></span>
        </div>
        <div style="height:12px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--border)">
          <div style="position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--accent),#4ade80);border-radius:6px;transition:width .4s;width:${Math.min(100,Math.round(calIn/Math.max(calIn,burnActual,1)*100))}%"></div>
          <div style="position:absolute;right:0;top:0;height:100%;background:linear-gradient(90deg,#fb923c,var(--orange));border-radius:6px;transition:width .4s;width:${Math.min(100,Math.round(burnActual/Math.max(calIn,burnActual,1)*100))}%;opacity:.6"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:6px">
          <span style="color:${deficit>0?'var(--green)':'var(--red)'}">
            ${deficit>0?`✓ Deficit: ${deficit} kcal`:`⚠ Surplus: ${Math.abs(deficit)} kcal`}
          </span>
          <span style="color:var(--t3)">TDEE ~${tdee}</span>
        </div>
      </div>

      <!-- Duration slider (interactive burn update) -->
      <div style="padding:12px 14px 14px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:4px">
          <span>Session duration</span>

function updateDuration(val,weight,dow){
  const w=tw();
  w.duration=parseInt(val);
  save();
  document.getElementById("dur-display").textContent=val+" min";
  // Re-render workout after short debounce
  clearTimeout(window._durTimer);
  window._durTimer=setTimeout(()=>workout(),300);
}

function setRPE(n){
  const w=tw();
  w.rpe=n;
  save();
  document.querySelectorAll("#rpe-grp button").forEach((b,i)=>{
    const active=i+1===n;
    b.style.background=active?"var(--accent)":"var(--bg2)";
    b.style.color=active?"var(--bg0)":"var(--t3)";
  });
}

function weightLossProjection(weight){
  // Collect last 7 days of deficit
  const today=new Date();
  let totalDeficit7=0, days=0;
  for(let i=0;i<7;i++){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const meals=(D.meals||{})[k]||[];
    const calIn=meals.reduce((s,m)=>s+m.c,0);
    const wo=D.workouts?.[k];
    const plan=PLANS[d.getDay()];
    const burn=wo?.burnOverride||wo?.duration&&estBurn(plan,weight,wo.duration)||plan.burnEst;
    if(calIn>0||wo?.done){totalDeficit7+=burn-calIn; days++;}
  }
  if(days===0) return "";
  const avgDaily=totalDeficit7/days;
  // 7700 kcal = ~1 kg fat
  const kgPerWeek=((avgDaily*7)/7700).toFixed(2);
  const weeksTo5kg=avgDaily>0?Math.round(5/(avgDaily*7/7700)):null;
  const color=avgDaily>0?"var(--green)":"var(--red)";

  return `<div class="sec">
    <div class="sec-title" style="margin-bottom:10px">⚡ Weight loss projection</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
      <div style="background:var(--bg2);border-radius:10px;padding:12px 8px;border:1px solid var(--border)">
        <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:${color}">${avgDaily>0?"+":""} ${Math.round(avgDaily)}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px">avg daily deficit</div>
      </div>
      <div style="background:var(--bg2);border-radius:10px;padding:12px 8px;border:1px solid var(--border)">
        <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:${color}">${kgPerWeek}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px">kg/week pace</div>
      </div>
      <div style="background:var(--bg2);border-radius:10px;padding:12px 8px;border:1px solid var(--border)">
        <div style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--t1)">${weeksTo5kg||"—"}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px">wks to lose 5 kg</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--t3);margin-top:8px;line-height:1.5">Based on last ${days} day${days!==1?"s":""} of logged data. 7,700 kcal ≈ 1 kg fat. Accurate only when meals + workouts are logged consistently.</div>
  </div>`;
}

function addCustomEx(dow){
  const groupSel=document.getElementById("ew-group")?.value;
  const newGrp=document.getElementById("ew-newgroup")?.value?.trim();
  const grp=groupSel==="__new__"?newGrp:groupSel;
  const ex=document.getElementById("ew-ex")?.value?.trim();
  if(!grp||!ex){toast("Group and exercise name required");return;}
  if(!D.customExercises) D.customExercises={};
  if(!D.customExercises[dow]) D.customExercises[dow]={};
  if(!D.customExercises[dow][grp]) D.customExercises[dow][grp]=[];
  if(D.customExercises[dow][grp].includes(ex)){toast("Already in list");return;}
  D.customExercises[dow][grp].push(ex);
  save();closeModal();toast("Exercise added ✓");workout();
}

function deleteCustomEx(dow,grp,ex){
  if(!D.customExercises?.[dow]?.[grp]) return;
  D.customExercises[dow][grp]=D.customExercises[dow][grp].filter(e=>e!==ex);
  save();workout();
}

function toggleEx(name){
  const w=tw();
  w.ex[name]=!w.ex[name];
  save();workout();
}

function markWorkout(){
  const w=tw();
  w.done=!w.done;
  save();
  if(w.done) toast("Session logged ✓");
  workout();
}

function recentWorkouts(){
  const today=new Date();
  let html="";
  for(let i=1;i<=7;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const w=D.workouts[k];
    const plan=PLANS[d.getDay()];
    const cnt=w?Object.values(w.ex||{}).filter(Boolean).length:0;
    html+=`<div class="hrow">
      <span class="hrow-date">${fmtDate(d)}</span>
      <span class="hrow-val">${esc(plan.focus)}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${w?.done?"var(--green)":cnt>0?"var(--yellow)":"var(--t3)"}">
        ${w?.done?"✓ Done":cnt>0?cnt+"/"+Object.values(plan.groups).flat().length:"—"}
      </span>
    </div>`;
  }
  return html||`<div class="empty">No sessions logged yet</div>`;
}

function supplements(){
  const s=ts();
  const allSupps=[...SUPPS,...(D.customSupps||[])];
  const total=allSupps.filter(x=>s[x.id]).length;
  const suppView=D._suppView||"list";
  const h=new Date().getHours();
  const currentSlot=h<11?"Morning":h<15?"Afternoon":h<19?"Evening":"Before bed";

  const suppGroup=(label,items,color)=>items.length===0?"":(`
    <div class="sec">
      <div class="sec-title" style="color:${color};margin-bottom:10px">${label}</div>
      ${items.map(x=>suppItem(x)).join("")}
    </div>`);

  const listView=()=>
    suppGroup("⚡ Priority — for current deficiencies",allSupps.filter(s=>s.p==="urgent"),"var(--red)")
    +suppGroup("High — addressing findings",allSupps.filter(s=>s.p==="high"),"var(--orange)")
    +suppGroup("Maintenance",allSupps.filter(s=>!s.p),"var(--t3)");

  const timelineView=()=>{
    // Build a sorted schedule: group items by their specific times
    const schedule=[];
    allSupps.forEach(supp=>{
      const times=supp.times||[];
      if(times.length){
        times.forEach(t=>schedule.push({supp,time:t}));
      } else {
        // fallback: use slot name if no specific time
        (supp.slots||["—"]).forEach(s=>schedule.push({supp,time:s}));
      }
    });
    // Sort by time: parse "7:30 AM" style
    const toMins=t=>{
      const m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if(!m) return 9999;
      let h=parseInt(m[1]),mn=parseInt(m[2]);
      if(m[3].toUpperCase()==="PM"&&h!==12) h+=12;
      if(m[3].toUpperCase()==="AM"&&h===12) h=0;
      return h*60+mn;
    };
    schedule.sort((a,b)=>toMins(a.time)-toMins(b.time));
    // Group by time string
    const byTime={};
    schedule.forEach(({supp,time})=>{
      if(!byTime[time]) byTime[time]=[];
      if(!byTime[time].find(x=>x.id===supp.id)) byTime[time].push(supp);
    });
    // Current time in minutes
    const nowMins=new Date().getHours()*60+new Date().getMinutes();
    return Object.entries(byTime).map(([t,items])=>{
      const tMins=toMins(t);
      const isPast=tMins<nowMins&&tMins!==9999;
      const isNext=!isPast&&tMins!==9999&&Object.keys(byTime).filter(x=>toMins(x)>=nowMins)[0]===t;
      const timeLabel=tMins===9999?t:`<span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${isNext?'var(--accent)':isPast?'var(--t3)':'var(--t1)'}">${t}</span>`;
      return `<div class="sec" style="opacity:${isPast?'0.5':'1'}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          ${timeLabel}
          ${isNext?`<span style="background:rgba(94,234,212,0.15);color:var(--accent);font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;border:1px solid rgba(94,234,212,0.3)">NEXT UP</span>`:""}
          ${isPast?`<span style="font-size:11px;color:var(--t3)">done window</span>`:""}
        </div>
        ${items.map(x=>suppItem(x)).join("")}
      </div>`;
    }).join("");
  };

  $("#app").innerHTML=`
    <div class="hdr">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="go('more')" style="background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer">‹</button>
          <div class="hdr-eye" style="margin:0">${fmtDate()}</div>
        </div>
        <button onclick="openAddSupp()" style="background:var(--accent);color:var(--bg0);border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">+ Add</button>
      </div>
      <div class="hdr-title">Stack <em>check-in</em></div>
      <div class="hdr-sub">${total} of ${allSupps.length} taken · ${currentSlot.toLowerCase()} now</div>
    </div>

    <div class="tabs" style="margin:0 14px 14px">
      <button class="tab${suppView==="list"?" on":""}" onclick="D._suppView='list';supplements()">By priority</button>
      <button class="tab${suppView==="time"?" on":""}" onclick="D._suppView='time';supplements()">By time</button>
    </div>

    ${suppView==="time"?timelineView():listView()}

    <div style="padding:0 14px 16px">
      <button class="btn-ghost" style="width:100%;padding:12px" onclick="openAddSupp()">+ Add supplement</button>
    </div>
    <div class="spacer"></div>
  `;
}

        ${timePills}

        ${foodCtxBadge(ctx)}

function saveNewSupp(){
  const name=document.getElementById("as-name")?.value?.trim();
  if(!name){toast("Name required");return;}
  const slots=[...document.querySelectorAll("#as-slots button")].filter(b=>b.dataset.on).map(b=>b.dataset.slot);
  const t1=document.getElementById("as-t1")?.value;
  const t2=document.getElementById("as-t2")?.value;
  const times=[t1,t2].filter(Boolean).map(fmt12);
  const ctxBtn=document.querySelector("#as-ctx [data-sel='1']");
  if(!D.customSupps) D.customSupps=[];
  D.customSupps.push({
    id:"cs_"+Date.now(), name,
    dose:document.getElementById("as-dose")?.value||"As directed",
    slots:slots.length?slots:["Morning"],
    times,
    foodCtx:ctxBtn?.dataset.ctx||"anytime",
    p:document.getElementById("as-p")?.value||""
  });
  save();closeModal();toast("Added to stack ✓");supplements();
}

function fmt12(t24){
  if(!t24) return "";
  const [h,m]=t24.split(":").map(Number);
  const ampm=h<12?"AM":"PM";
  const h12=h===0?12:h>12?h-12:h;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

function deleteCustomSupp(id){
  D.customSupps=(D.customSupps||[]).filter(s=>s.id!==id);
  save();supplements();
}

    <div class="hdr">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <button onclick="go('more')" style="background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer">‹</button>
        <div class="hdr-eye" style="margin:0">${fmtDate()}</div>
      </div>
      <div class="hdr-title">Body <em>metrics</em></div>
      <div class="hdr-sub">Log weekly · Sundays are ideal</div>
    </div>

    <div class="card-glow">
      <div class="label" style="margin-bottom:6px;text-align:center">Weight (kg)</div>
      <input type="number" inputmode="decimal" class="big-in" id="wi"
        placeholder="${latest?.w||"0.0"}" step="0.1">
      <div class="body-grid" style="margin-top:14px">
        <div>
          <div class="label" style="margin-bottom:6px">Waist (cm)</div>
          <input type="number" inputmode="decimal" class="tin" id="wai" placeholder="${latest?.waist||""}">
        </div>
        <div>
          <div class="label" style="margin-bottom:6px">Body Fat %</div>
          <input type="number" inputmode="decimal" class="tin" id="bfi" placeholder="${latest?.bf||""}">
        </div>
      </div>
    </div>

    <div style="padding:0 14px 14px">
      <button class="btn" onclick="saveMetrics()">Save entry</button>
    </div>

    ${latest?`
      <div class="mgrid">
        <div class="mtile">
          <div class="mtile-lbl">Latest</div>
          <div class="mtile-val">${latest.w}<span class="mtile-unit">kg</span></div>
          ${D.metrics.length>1?`<div class="mtile-trend ${latest.w<D.metrics[D.metrics.length-2].w?"up":"dn"}">
            ${(latest.w-D.metrics[D.metrics.length-2].w>0?"+":"")+((latest.w-D.metrics[D.metrics.length-2].w).toFixed(1))}kg
          </div>`:""}
        </div>
        <div class="mtile">
          <div class="mtile-lbl">BMI</div>
          <div class="mtile-val">${bmi}</div>
          <div class="mtile-trend">${bmi<18.5?"underweight":bmi<25?"normal":bmi<30?"overweight":"obese"}</div>
        </div>
      </div>
    `:""}

    ${D.metrics.length>0?`
      <div class="label" style="margin:16px 14px 10px">History</div>
      ${D.metrics.slice().reverse().slice(0,15).map(m=>`
        <div class="hrow">
          <span class="hrow-date">${fmtDate(new Date(m.date))}</span>
          <span class="hrow-val">${m.w}kg${m.waist?` · ${m.waist}cm`:""}${m.bf?` · ${m.bf}%`:""}</span>
        </div>`).join("")}
    `:""}
    <div class="spacer"></div>
  `;
}

function saveMetrics(){
  const w=parseFloat(document.getElementById("wi")?.value);
  if(!w||w<30||w>250){toast("Enter a valid weight");return;}
  D.metrics.push({
    date:new Date().toISOString(),
    w,
    waist:parseFloat(document.getElementById("wai")?.value)||null,
    bf:parseFloat(document.getElementById("bfi")?.value)||null
  });
  save();toast("Saved ✓");body();
}

// ══════════════════════════════════════════════
// LABS
// ══════════════════════════════════════════════
let _labTab="all";

function labs(){
  const filtered=_labTab==="all"?LABS:_labTab==="watch"?LABS.filter(m=>m.priority!=="good"):LABS.filter(m=>m.priority==="good");

  $("#app").innerHTML=`
    <div class="hdr">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <button onclick="go('more')" style="background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer">‹</button>
        <div class="hdr-eye" style="margin:0">Last test: 30 Apr 2026</div>
      </div>
      <div class="hdr-title">Lab <em>trends</em></div>
      <div class="hdr-sub">${LABS.length} markers · tap for detail + action</div>
    </div>

    <div class="tabs">
      <button class="tab${_labTab==="all"?" on":""}" onclick="_labTab='all';labs()">All (${LABS.length})</button>
      <button class="tab${_labTab==="watch"?" on":""}" onclick="_labTab='watch';labs()">Watch (${LABS.filter(m=>m.priority!=="good").length})</button>
      <button class="tab${_labTab==="good"?" on":""}" onclick="_labTab='good';labs()">Good (${LABS.filter(m=>m.priority==="good").length})</button>
    </div>

    ${filtered.map(m=>labCard(m)).join("")}
    <div class="spacer"></div>
  `;
}

function labCard(m){
  const v=m.history[m.history.length-1]?.v;
  const st=markerStatus(m);
  const cls=markerCls(m);
  const h=m.history;
  const vals=h.map(x=>x.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;

  const bars=h.map((x,i)=>{
    const hp=Math.max(15,Math.round(((x.v-mn)/rng)*100));
    let sc="";
    if(x.v>m.hi) sc=m.priority==="urgent"?"s-urg":"s-hi";
    else if(x.v<m.lo) sc="s-hi";
    else sc="s-ok";
    if(i===h.length-1) sc+=" ";// just keep color
    return `<div class="spark-b ${sc}" style="height:${hp}%"></div>`;
  }).join("");

  const trend=h.length>=2?h.slice(-4).map(x=>x.v).join(" → "):"First reading";

  return `<div class="lcard" onclick="showLabDetail('${esc(m.name)}')">
    <div class="lcard-hdr">
      <div>
        <div class="lcard-name">${esc(m.name)}</div>
        <div class="lcard-ref">${esc(m.ref)} · ${esc(m.unit)}</div>
      </div>
      <div class="lcard-val ${cls}">${v??'—'}</div>
    </div>
    <div class="lcard-trend">
      <div class="spark">${bars}</div>
      <div class="lcard-trend-txt">${esc(trend)}</div>
    </div>
  </div>`;
}

function showLabDetail(name){
  const m=LABS.find(x=>x.name===name);
  if(!m) return;
  const v=m.history[m.history.length-1]?.v;
  const cls=markerCls(m);
  modal(`
    <div class="modal-title">${esc(m.name)}</div>
    <div class="modal-sub">${esc(m.ref)} · ${esc(m.unit)}</div>
    <div style="text-align:center;margin:20px 0 24px">
      <div class="lcard-val ${cls}" style="font-family:'DM Serif Display',Georgia,serif;font-size:56px;letter-spacing:-.03em">${v??'—'}</div>
      <div style="font-size:12px;color:var(--t2);margin-top:4px">Latest · ${m.history[m.history.length-1]?.d||"unknown"}</div>
    </div>
    <div class="label" style="margin-bottom:10px">All readings</div>
    ${m.history.slice().reverse().map(h=>{
      let vc="";
      if(h.v>m.hi) vc=m.priority==="urgent"?"color:var(--red)":"color:var(--orange)";
      else if(h.v<m.lo) vc="color:var(--orange)";
      else vc="color:var(--green)";
      return `<div class="hrow"><span class="hrow-date">${esc(h.d)}</span><span class="hrow-val" style="${vc}">${h.v} ${esc(m.unit)}</span></div>`;
    }).join("")}
    ${m.action?`
      <div class="card" style="margin:16px 0 0">
        <div class="label" style="margin-bottom:8px">Action</div>
        <div style="font-size:14px;line-height:1.6;color:var(--t1)">${esc(m.action)}</div>
      </div>`:""}
    <button class="btn" style="margin-top:16px" onclick="closeModal()">Close</button>
  `);
}

// ══════════════════════════════════════════════
// MORE
// ══════════════════════════════════════════════
function more(){
  $("#app").innerHTML=`
    <div class="hdr">
      <div class="hdr-eye">${fmtDate()}</div>
      <div class="hdr-title">More <em>tools</em></div>
    </div>

    <div class="label" style="margin:0 14px 10px">Track</div>
    ${moreItem("supplements","Supplements","Daily stack check-in",`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 12h6"/></svg>`)}
    ${moreItem("body","Body metrics","Weight · waist · BMI",`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>`)}
    ${moreItem("labs","Lab trends","All 17 blood markers",`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2h-2"/><rect x="9" y="1" width="6" height="4" rx="1"/><path d="M9 12l2 2 4-4"/></svg>`)}

    <div class="label" style="margin:20px 14px 10px">Settings</div>
    <div class="more-item" onclick="openTargets()">
      <div class="more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg></div>
      <div class="more-body">
        <div class="more-title">Daily targets</div>
        <div class="more-desc">Calories ${D.targets.cal} · Protein ${D.targets.prot}g · Water ${D.targets.water}L</div>
      </div>
      <svg class="more-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>

    <div class="label" style="margin:20px 14px 10px">Data</div>
    <div class="more-item" onclick="exportData()">
      <div class="more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
      <div class="more-body">
        <div class="more-title">Export backup</div>
        <div class="more-desc">Download all data as JSON</div>
      </div>
    </div>
    <div class="more-item" onclick="document.getElementById('imp').click()">
      <div class="more-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
      <div class="more-body">
        <div class="more-title">Import backup</div>
        <div class="more-desc">Restore from JSON file</div>
      </div>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(this)">
    </div>

    <div class="card" style="margin-top:14px">
      <div style="font-size:13px;color:var(--t2);line-height:1.7">
        <strong style="color:var(--t1)">Vital</strong> · Personal health tracker<br>
        Data lives on <strong style="color:var(--t1)">your device only</strong>. Export regularly.<br>
        <span style="color:var(--t3)">Tracker, not medical advice.</span>
      </div>
    </div>
    <div class="spacer"></div>
  `;
}

function moreItem(view,title,desc,icon){
  return `<div class="more-item" onclick="go('${view}')">
    <div class="more-icon">${icon}</div>
    <div class="more-body">
      <div class="more-title">${title}</div>
      <div class="more-desc">${desc}</div>
    </div>
    <svg class="more-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </div>`;
}

function openTargets(){
  const T=D.targets;
  modal(`
    <div class="modal-title">Daily targets</div>
    <div class="modal-sub">These drive all your dashboard math</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      ${[["Calories","cal",T.cal],["Protein (g)","prot",T.prot],["Fat (g)","fat",T.fat],["Carbs (g)","carbs",T.carbs],["Water (L)","water",T.water],["Height (cm)","height",T.height]].map(([l,k,v])=>`
        <div>
          <div class="label" style="margin-bottom:6px">${l}</div>
          <input type="number" class="tin" id="t-${k}" value="${v}" ${k==="water"?"step=0.1":""}>
        </div>`).join("")}
    </div>
    <button class="btn" onclick="saveTargets()">Save targets</button>
  `);
}

function saveTargets(){
  ["cal","prot","fat","carbs","water","height"].forEach(k=>{
    const v=parseFloat(document.getElementById("t-"+k)?.value);
    if(v&&v>0) D.targets[k]=v;
  });
  save();closeModal();toast("Targets updated");
}

function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`vital-backup-${today()}.json`;
  a.click();URL.revokeObjectURL(url);
  toast("Backup downloaded");
}

function importData(inp){
  const file=inp.files[0];if(!file) return;
  if(!confirm("This replaces ALL current data. Continue?")) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.targets||!data.daily) throw new Error("Invalid file");
      D=Object.assign(init(),data);
      save();toast("Data restored ✓");render();
    }catch(err){toast("Import failed: "+err.message);}
  };
  r.readAsText(file);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
render();

document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){D=load();render();}
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
